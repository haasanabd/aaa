name: haa_backup
description: A professional Flutter app for media backup and management with optimized performance.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  share_plus: ^10.1.0
  file_picker: ^8.1.2
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  image_picker: ^1.1.2
  video_player: ^2.9.1
  permission_handler: ^11.3.1
  flutter_secure_storage: ^9.2.2
  archive: ^3.6.1
  intl: ^0.19.0
  crypto: ^3.0.6
  flutter_image_compress: ^2.3.0

dev_dependencies:
  share_plus: ^10.1.0
  file_picker: ^8.1.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
